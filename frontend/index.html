<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExaBot — Resume Q&A Bot</title>
  <meta name="description" content="ExaBot: Ask questions about your resume using natural language." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page-bg" aria-hidden="true"></div>

  <div class="layout">

    <!-- ── Sidebar Overlay (mobile) ── -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-inner">
        <!-- Brand -->
        <div class="brand">
          <div class="brand-logo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div>
            <div class="brand-name">ExaBot</div>
            <div class="brand-sub">Resume Q&amp;A Bot</div>
          </div>
        </div>

        <div class="divider"></div>

        <!-- Upload -->
        <div class="section-label">Resume</div>

        <div id="uploadZone" class="upload-zone" role="button" tabindex="0" aria-label="Upload resume PDF">
          <input type="file" id="fileInput" accept=".pdf" aria-label="Select PDF" />
          <div class="upload-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="upload-main">Drop <strong>resume.pdf</strong></p>
          <p class="upload-sub">or click to browse</p>
        </div>

        <div id="uploadProgress" class="progress-wrap hidden">
          <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
          <span id="progressText" class="progress-label">Uploading…</span>
        </div>

        <div id="statusPill" class="status-pill hidden">
          <span class="status-dot"></span>
          <span id="statusLabel">Indexed</span>
        </div>

        <div class="divider"></div>

        <!-- Quick questions (4 only) -->
        <div class="section-label">Quick Questions</div>
        <nav id="quickNav" class="quick-nav" aria-label="Quick questions"></nav>

        <!-- Spacer -->
        <div style="flex:1"></div>

        <div class="divider"></div>

        <!-- Clear chat -->
        <button id="clearBtn" class="btn-sidebar-action">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          Clear Chat
        </button>

        <!-- Dark mode toggle -->
        <div class="theme-toggle-row">
          <div class="theme-icon-label">
            <span id="themeIcon">☀️</span>
            <span id="themeLabel">Light Mode</span>
          </div>
          <button class="toggle-switch" id="themeToggle" role="switch" aria-checked="false" aria-label="Toggle dark mode">
            <span class="toggle-thumb"></span>
          </button>
        </div>

      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

      <!-- Topbar -->
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar" title="Toggle sidebar">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>

        <div class="topbar-info">
          <div class="topbar-avatar">E</div>
          <div>
            <div class="topbar-name">ExaBot</div>
            <div class="topbar-sub" id="topbarSub">Upload your resume to begin</div>
          </div>
        </div>

        <div id="liveBadge" class="live-badge hidden">
          <span class="live-dot"></span>Live
        </div>
      </header>

      <!-- Chat feed -->
      <div class="chat-feed" id="chatFeed" role="log" aria-live="polite">

        <div class="empty-state" id="emptyState">
          <div class="empty-avatar">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2>HI, I'M ExaBOT</h2>
          <p>I can answer any question about your resume — skills, experience, education and more.</p>
          
        </div>

      </div>

      <!-- Input -->
      <div class="input-dock">
        <div class="input-glass">
          <textarea
            id="messageInput"
            placeholder="Ask ExaBot about your resume…"
            rows="1"
            aria-label="Message"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" aria-label="Send" title="Send (Enter)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="input-caption"><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> new line</p>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
